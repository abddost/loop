name: Marketing

on:
  push:
    branches:
      - main
    paths:
      - "src/marketing/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/marketing.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build marketing site
        run: bun run build:marketing
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.MARKETING_SITE_URL || 'https://loopai.app' }}
          NEXT_PUBLIC_GITHUB_REPO: ${{ vars.MARKETING_GITHUB_REPO || 'abddost/loop' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy src/marketing/out --project-name=loop-marketing --branch=main
