name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
            platform: mac
            arch: arm64
            electron_os: mac
            electron_arch: arm64
          - name: macOS x64
            runner: macos-13
            platform: mac
            arch: x64
            electron_os: mac
            electron_arch: x64
          - name: Windows x64
            runner: windows-2022
            platform: win
            arch: x64
            electron_os: win
            electron_arch: x64
          - name: Linux x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
            electron_os: linux
            electron_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stage Bun sidecar
        shell: bash
        run: |
          set -euo pipefail
          target_dir="resources/bun-${{ matrix.electron_os }}-${{ matrix.electron_arch }}"
          mkdir -p "$target_dir"

          bun_path="$(bun -e 'console.log(process.execPath)')"
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            cp "$bun_path" "$target_dir/bun.exe"
          else
            cp "$bun_path" "$target_dir/bun"
            chmod +x "$target_dir/bun"
          fi

      - name: Build desktop installer
        shell: bash
        run: |
          set -euo pipefail
          # Bump file descriptor limit (Loop's node_modules has thousands of files).
          # No-op on Windows; ulimit may be missing or restricted there.
          if [[ "${{ matrix.platform }}" != "win" ]]; then
            ulimit -n 65536 || true
          fi
          bun run build
          bun run build:electron
          # --publish never: the dedicated publish job uploads artifacts via
          # softprops/action-gh-release. Without this, electron-builder reads
          # `publish: github` from electron-builder.yml and demands GH_TOKEN.
          bunx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never

      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in release/*.dmg release/*.zip release/*.exe release/*.AppImage release/*.blockmap release/*.yml; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: loop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: loop-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/*.yml
