name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
            platform: mac
            arch: arm64
            electron_os: mac
            electron_arch: arm64
          - name: macOS x64
            runner: macos-13
            platform: mac
            arch: x64
            electron_os: mac
            electron_arch: x64
          - name: Windows x64
            runner: windows-2022
            platform: win
            arch: x64
            electron_os: win
            electron_arch: x64
          - name: Linux x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
            electron_os: linux
            electron_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stage Bun sidecar
        shell: bash
        run: |
          set -euo pipefail
          target_dir="resources/bun-${{ matrix.electron_os }}-${{ matrix.electron_arch }}"
          mkdir -p "$target_dir"

          bun_path="$(bun -e 'console.log(process.execPath)')"
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            cp "$bun_path" "$target_dir/bun.exe"
          else
            cp "$bun_path" "$target_dir/bun"
            chmod +x "$target_dir/bun"
          fi

      - name: Build desktop installer
        shell: bash
        env:
          # macOS code signing (Developer ID Application cert as base64 .p12).
          # Harmless on Linux/Windows — electron-builder ignores it there.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization via App Store Connect API key. The secret
          # APPLE_API_KEY holds the .p8 *content*; electron-builder wants a
          # file path, so we write the content to disk below.
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          # Bump file descriptor soft limit (Loop's node_modules has thousands
          # of files; default macOS soft limit of 256 causes EMFILE during
          # electron-builder's file copy). Raising soft up to the hard limit
          # only requires no privileges. macOS GitHub runners have a hard
          # limit of at least 10240.
          if [[ "${{ matrix.platform }}" != "win" ]]; then
            ulimit -Sn 10240 || true
            echo "fd limit: $(ulimit -n)"
          fi
          # On macOS: materialise the App Store Connect API key to a file and
          # set APPLE_API_KEY to its path (electron-builder expects a path,
          # not content).
          if [[ "${{ matrix.platform }}" == "mac" && -n "${APPLE_API_KEY_CONTENT:-}" ]]; then
            mkdir -p "$RUNNER_TEMP/private_keys"
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
            export APPLE_API_KEY="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          fi
          bun run build
          bun run build:electron
          # --publish never: the dedicated publish job uploads artifacts via
          # softprops/action-gh-release. Without this, electron-builder reads
          # `publish: github` from electron-builder.yml and demands GH_TOKEN.
          bunx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never

      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          # Inline the globs in the for loop so bash's pathname expansion
          # preserves filenames with spaces (Windows produces "Loop Setup
          # 0.1.0.exe"). Storing the glob in a variable first would word-split
          # the matched filenames on spaces.
          for file in release/*.dmg release/*.zip release/*.exe release/*.AppImage release/*.blockmap release/*.yml; do
            cp "$file" release-publish/
          done

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: loop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: loop-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/*.yml
