appId: com.loop.app
productName: Loop

# asar packs the bundle into a single archive — Gatekeeper verifies one file
# instead of tens of thousands on first launch. Bun can't read .asar, so
# anything bun touches at runtime must be in asarUnpack below.
asar: true
asarUnpack:
  # Bundled server entrypoint (run by the bun sidecar)
  - dist-server/**/*
  # SQL migration files (drizzle reads these from disk at startup)
  - drizzle/**/*
  # Unpack ALL node_modules. The bun sidecar cannot read files inside
  # asar archives (only Electron's overridden fs can), and packages like
  # @cursor/sdk are webpack-pre-bundled with peer deps (zod, sqlite3, etc.)
  # baked in as runtime requires. Selectively unpacking turns into a
  # whack-a-mole of transitive deps — wildcard is the only reliable
  # approach. Asar still wraps dist/ + dist-electron/ + dist-server/, which
  # is the part Gatekeeper verifies fastest anyway.
  - node_modules/**

directories:
  buildResources: src/desktop/resources
  output: release

files:
  # Frontend bundle (Vite output) — already includes react, monaco, shiki, heroui, etc.
  - dist/**/*
  # Electron main + preload bundles (tsdown output)
  - dist-electron/**/*
  # Pre-bundled server (tsdown output) — already includes hono, drizzle-orm,
  # all @ai-sdk providers, @anthropic-ai, @openai, @openrouter, etc.
  - dist-server/**/*
  # SQL migrations (drizzle loads at startup; not bundleable)
  - drizzle/**/*
  - package.json
  - tsconfig.json
  # node_modules is needed only for things that can't be bundled (native
  # modules, Electron-runtime deps). The exclusions strip out packages
  # already inlined into the dist/ and dist-server/ bundles. Without these,
  # the .app ships ~400 MB of duplicated code.
  # Build-time tools (next, tailwindcss, @tailwindcss/vite) live in
  # devDependencies and are auto-pruned by electron-builder along with
  # their transitives. Runtime packages bundled into dist/ or dist-server/
  # still ship as duplicates here, so a few exclusions remain.
  - node_modules/**/*
  - "!node_modules/@anthropic-ai/**"
  - "!node_modules/@ai-sdk/**"
  - "!node_modules/@openai/**"
  - "!node_modules/@openrouter/**"
  - "!node_modules/@modelcontextprotocol/**"
  - "!node_modules/@heroui/**"
  - "!node_modules/@xterm/**"
  - "!node_modules/monaco-editor/**"
  - "!node_modules/shiki/**"
  - "!node_modules/vscode-material-icons/**"
  - "!node_modules/tailwind-merge/**"
  - "!node_modules/{react,react-dom}/**"
  - "!node_modules/@tanstack/**"

mac:
  target:
    - dmg
    - zip
  # Always include the arch suffix so Intel and Apple Silicon files are
  # distinguishable. Without this, electron-builder omits `-x64` for the
  # default arch, producing `Loop-0.1.0.dmg` (Intel) and breaking downloader
  # logic that filters by arch.
  artifactName: ${productName}-${version}-${arch}.${ext}
  icon: src/desktop/resources/icon.icns
  category: public.app-category.developer-tools
  darkModeSupport: true

win:
  target: nsis
  icon: src/desktop/resources/icon.ico

linux:
  # AppImage (portable), .deb (Debian/Ubuntu), .rpm (Fedora/RHEL/openSUSE).
  # electron-updater reads `latest-linux.yml` / `latest-linux-arm64.yml`
  # (auto-generated by electron-builder) to drive in-app updates for all
  # three formats.
  target:
    - AppImage
    - deb
    - rpm
  # Match the macOS pattern so x64 and arm64 files are distinguishable.
  # apt/dnf only read the package metadata, not the filename — capitalised
  # filenames are harmless once installed.
  artifactName: ${productName}-${version}-${arch}.${ext}
  icon: src/desktop/resources/icon.png
  category: Development
  # Lowercase binary + .desktop Exec name. Without this, electron-builder
  # emits a .desktop file pointing at "Loop", which breaks PATH lookups.
  executableName: loop
  synopsis: AI coding assistant desktop app
  description: |
    Loop is a minimal desktop GUI for using code agents. It bundles an
    embedded server and local SQLite database so everything runs on your
    machine — no extra setup required.
  vendor: Loop
  maintainer: Loop <support@loopai.app>

deb:
  # Shared libraries Electron 41 needs on Debian/Ubuntu. apt resolves these
  # on install. libasound2t64 is the post-time_t-transition name (Ubuntu
  # 24.04+, Debian 13+); modern distros only.
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libdrm2
    - libgbm1
    - libasound2t64

rpm:
  # Fedora/RHEL/openSUSE names for the same set of libraries.
  depends:
    - libnotify
    - libXScrnSaver
    - libXtst
    - xdg-utils
    - at-spi2-atk
    - libdrm
    - mesa-libgbm
    - alsa-lib

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

extraResources:
  - from: resources/bun-${os}-${arch}
    to: bun
    filter:
      - "**/*"

publish:
  provider: github
  # Explicit owner/repo so electron-updater works at runtime even when the
  # packaged app has no `.git/` and git-remote inference can't fire.
  owner: abddost
  repo: loop
  releaseType: release
