appId: com.loop.app
productName: Loop

asar: false

directories:
  buildResources: src/desktop/resources
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - src/server/**/*
  - src/core/**/*
  - drizzle/**/*
  - package.json
  - tsconfig.json
  - node_modules/**/*

mac:
  target:
    - dmg
    - zip
  icon: src/desktop/resources/icon.icns
  category: public.app-category.developer-tools
  darkModeSupport: true

win:
  target: nsis
  icon: src/desktop/resources/icon.ico

linux:
  target: AppImage
  icon: src/desktop/resources/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

extraResources:
  - from: resources/bun-${os}-${arch}
    to: bun
    filter:
      - "**/*"

publish:
  provider: github
